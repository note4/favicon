name: Sync Multi-Size Favicons

on:
  schedule:
    - cron: '0 0 * * *'  # 每天北京时间 08:00 运行
  push:
    paths:
      - 'siteurl.txt'    # 仅当清单更新时运行
  workflow_dispatch:     # 支持手动点击运行

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # 必须开启写入权限
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Downloader
        run: python update_favicons.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add favicon/
          
          # 检查是否有文件更新
          if git diff --cached --quiet; then
            echo "没有图标更新，跳过 Commit"
          else
            git commit -m "chore: 自动同步网站图标 $(date +'%Y-%m-%d')"
            git push
          fi